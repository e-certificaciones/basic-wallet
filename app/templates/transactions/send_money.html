{% extends "layout.html" %}

{% block script %}
<script src="/static/js/validate-send-money.js"></script>   
{% endblock %}

{% block title %}
send money
{% endblock %}

{% block log %}
<a href="{{url_for('auth.logout')}}">
    <button class="btn btn-secondary ms-auto">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-box-arrow-right" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0z"/>
            <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708z"/>
        </svg>
        Logout
    </button>
</a>
{% endblock %}

{% block main %}

<div class="center-container">
    <form action="{{url_for('transactions.send_money')}}" method="post" id="lookup">
        <label>Acount Number</label>
        <input type="text" name="acount-number" id="acount-number" autocomplete="off" placeholder="Account number" class="form-control" value="{{data.acount_number}}">
        <p id="error-acount-number"><b class="error-message">{{ error.acount_number }}</b></p>
        <input type="hidden" name="step" value="lookup">
        <div class="center-container" style="margin-top: 2px;"><button class="btn btn-primary">Verify</button></div>
    </form>
</div>
<hr>

{% if data_recipient %}
<div class="center-container">
    <form action="{{url_for('transactions.send_money')}} " method="post" id="send">
        <input type="text" disabled value="Name: {{data_recipient.name}} {{data_recipient.last_name}}" class="form-control">
        <label>Amount</label>
        <input type="text" name="amount" id="amount" autocomplete="off" placeholder="Amount" class="form-control" value="{{data.amount}}">
        <p id="error-amount"><b class="error-message">{{ error.amount }}</b></p>
        
        <input type="hidden" name="step" value="send"> <!-- al usar un input hidden con un valor por defecto podemos filtrar en el archivo de ruta sobre que form estamos interactuando-->
        <!-- los mando escondidos al post de send y volverlos mostrar en caso de error-->
        <input type="hidden" name="name" value="{{data_recipient.name}}"> 
        <input type="hidden" name="last_name" value="{{data_recipient.last_name}}">
        <input type="hidden" name="acount-number" value="{{data.acount_number}}"> <!-- tomamos acount number del primer form -->

        <div class="center-container"><button class="btn btn-primary">Send</button></div>
    </form>
</div>
{% endif %}

{% endblock %}
